<!DOCTYPE html>
<html lang="en">
<head>
    <title>Semantic Tags Example</title>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <section>
        <article>
            <h2>Article Title</h2>
            <p>This is an article inside a section.</p>
        </article>
    </section>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
