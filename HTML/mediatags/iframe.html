<!DOCTYPE html>
<html lang="en">
<head>
    <title>Iframe Example</title>
</head>
<body>

    <h1>YouTube Video</h1>

    <iframe width="560" height="315"
            src="https://youtu.behttps://www.reddit.com/r/IndiaCricket/comments/1l4p8y1/virat_kohli_cover_drives_with_slow_motion/?utm_source=share&utm_medium=web3x&utm_name=web3xcss&utm_term=1&utm_content=share_buttona"
            allowfullscreen>
    </iframe>

    <h1>Google Map</h1>

    <iframe>
    
        <div class="embed-map-responsive"><div class="embed-map-container"><iframe class="embed-map-frame" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="https://maps.google.com/maps?width=600&height=400&hl=en&q=SLA%20KK&t=&z=14&ie=UTF8&iwloc=B&output=embed"></iframe><a href="https://brushjjaemu.net" style="font-size:2px!important;color:gray!important;position:absolute;bottom:0;left:0;z-index:1;max-height:1px;overflow:hidden">Brush Jjaemu</a></div><style>.embed-map-responsive{position:relative;text-align:right;width:100%;height:0;padding-bottom:66.66666666666666%;}.embed-map-container{overflow:hidden;background:none!important;width:100%;height:100%;position:absolute;top:0;left:0;}.embed-map-frame{width:100%!important;height:100%!important;position:absolute;top:0;left:0;}</style></div>

    </iframe>

</body>
</html>
