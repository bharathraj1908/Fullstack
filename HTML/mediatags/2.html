<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Multimedia Webpage Example">
    <meta name="keywords" content="HTML, Audio, Video, Iframe">
    <meta name="author" content="Bharath Raj">

    <title>Multimedia Content</title>

    <!-- Favicon -->
    <link rel="icon" href="../Images/favicon_io/favicon-32x32.png" type="image/x-icon">
</head>

<body>
    <h1>Welcome to Multimedia Webpage</h1>

    <p>This webpage contains audio, video, and iframe elements.</p>

    <!-- Audio -->
    <audio controls>
        <source src="../audio/1.mpeg" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <br><br>

    <!-- Video -->
    <video width="400" controls>
        <source src="../video/kholidrive.mp4" type="video/mp4">
    </video>

</body>

</html>
