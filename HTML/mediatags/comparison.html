<!DOCTYPE html>
<html lang="en">
<head>
    <title>Semantic vs Non-Semantic Tags</title>
</head>
<body>

    <!-- Semantic Tags -->
    <header>
        <h1>Semantic Header</h1>
    </header>

    <section>
        <p>This section uses semantic tags.</p>
    </section>

    <footer>
        <p>Semantic Footer</p>
    </footer>

    <hr>

    <!-- Non-Semantic Tags -->
    <div>
        <h1>Non-Semantic Container</h1>
        <span>This is a span inside a div.</span>
    </div>

</body>
</html>
