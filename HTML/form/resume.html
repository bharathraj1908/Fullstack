
<html>
<head>
    <title>Resume Builde Site</title>
</head>
<body>

    <h1>Resume Builder Site</h1>

    <form>
        <fieldset>
            <legend>Personal Details</legend>

            <label>Full Name:</label><br>
            <input type="text" required>
            <br><br>

            <label>Email:</label><br>
            <input type="email" required>
            <br><br>

            <label>Phone Number:</label><br>
            <input type="tel" required>
            <br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Education Details</legend>

            <label>Degree:</label><br>
            <input type="text">
            <br><br>

            <label>College Name:</label><br>
            <input type="text">
            <br><br>

            <label>Year of Passing:</label><br>
            <input type="number">
            <br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Skills</legend>
            <textarea rows="4" cols="40"
                      placeholder="Enter your skills"></textarea>
        </fieldset>

        <br>

        <fieldset>
            <legend>Experience</legend>
            <textarea rows="4" cols="40"
                      placeholder="Enter your work experience"></textarea>
        </fieldset>

        <br>

        <fieldset>
            <legend>Upload Resume</legend>
            <input type="file">
        </fieldset>

        <br>

        <input type="submit" value="Build Resume">
    </form>

</body>
</html>
