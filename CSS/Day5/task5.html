<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justify Content </title>

    <link rel="stylesheet" href="../assests/task5.css">
</head>
<body>

    <h1>justify-content Example</h1>

    <!-- center -->

    <h2>justify-content: center</h2>

    <div class="container center">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <!-- space-between -->

    <h2>justify-content: space-between</h2>

    <div class="container space-between">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <!-- space-around -->

    <h2>justify-content: space-around</h2>

    <div class="container space-around">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <!-- space-evenly -->

    <h2>justify-content: space-evenly</h2>

    <div class="container space-evenly">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <!-- flex-start -->

    <h2>justify-content: flex-start</h2>

    <div class="container flex-start">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <!-- flex-end -->

    <h2>justify-content: flex-end</h2>

    <div class="container flex-end">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
